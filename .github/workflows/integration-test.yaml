name: integration-test
on:
  workflow_dispatch:
    inputs:
      deployWLO:
        description: 'WebSphere Liberty Operator'
        required: true
        type: boolean
        default: false
      deployApplication:
        description: 'Deploy application'
        required: true
        type: boolean
        default: true
      appImagePath:
        description: 'Application image path'
        required: true
        default: 'icr.io/appcafe/open-liberty/samples/getting-started'
      autoScaling:
        description: 'Autoscaling for app deployment'
        required: true
        type: boolean
        default: false
      deleteAzureResources:
        description: 'Delete Azure resources at the end'
        required: true
        type: boolean
        default: true
      location:
        description: 'Location of the Azure resources'
        required: true
        type: string
        default: 'westus3'
      configurations_for_it:
        description: "JSON string of environment variables used for IT"
        required: false
        default: '{}'
  # Allows you to run this workflow using GitHub workflow dispatch APIs
  # PERSONAL_ACCESS_TOKEN=<GITHUB_PERSONAL_ACCESS_TOKEN>
  # REPO_NAME=WASdev/azure.liberty.aro
  # Enable/disable WebSphere Liberty Operator and sample application. Keep/delete Azure resources at the end.
  # curl --verbose -XPOST -u "WASdev:${PERSONAL_ACCESS_TOKEN}" -H "Accept: application/vnd.github.everest-preview+json" -H "Content-Type: application/json" https://api.github.com/repos/${REPO_NAME}/actions/workflows/integration-test.yaml/dispatches --data '{"ref": "main", "inputs":{"deployWLO": "true|false", "deployApplication": "true|false", "autoScaling": "true|false", "deleteAzureResources": "true|false"}}'
  repository_dispatch:
    types: [integration-test]
  # Allows you to run this workflow using GitHub repository dispatch APIs
  # PERSONAL_ACCESS_TOKEN=<GITHUB_PERSONAL_ACCESS_TOKEN>
  # REPO_NAME=WASdev/azure.liberty.aro
  # Enable/disable WebSphere Liberty Operator and sample application. Keep/delete Azure resources at the end.
  # curl --verbose -X POST https://api.github.com/repos/${REPO_NAME}/dispatches -H "Accept: application/vnd.github.everest-preview+json" -H "Authorization: token ${PERSONAL_ACCESS_TOKEN}" --data '{"event_type": "integration-test", "client_payload": {"deployWLO": true|false, "deployApplication": true|false, "autoScaling": "true|false", "deleteAzureResources": "true|false"}}'
env:
  repoName: "azure.liberty.aro"
  azureCredentials: ${{ secrets.AZURE_CREDENTIALS }}
  userName: ${{ secrets.USER_NAME }}
  pullSecretEncoded: ${{ secrets.PULL_SECRET_ENCODED }}
  msTeamsWebhook: ${{ secrets.MSTEAMS_WEBHOOK }}
  testResourceGroup: libertyAroTestRG-${{ github.repository_owner }}-${{ github.run_id }}-${{ github.run_number }}
  testDeploymentName: libertyAroTestDeployment-${{ github.run_id }}-${{ github.run_number }}
  location: ${{ github.event.inputs.location || 'westus3' }}
jobs:
  integration-test:
    runs-on: ubuntu-latest
    env: ${{ fromJson(inputs.configurations_for_it) }}
    outputs:
      clientId: ${{ steps.deploy.outputs.clientId }}
    steps:
      - name: Get versions of external dependencies
        run: |
          curl -Lo external-deps-versions.properties https://raw.githubusercontent.com/Azure/azure-javaee-iaas/main/external-deps-versions.properties
          source external-deps-versions.properties
          echo "bicepVersion=${BICEP_VERSION}" >> $GITHUB_ENV
      - name: Set up JDK 1.8
        uses: actions/setup-java@v1
        with:
          java-version: 1.8
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          server-username: MAVEN_USERNAME # env variable for username
          server-password: MAVEN_TOKEN # env variable for token
      - name: Set Maven env
        env:
          MAVEN_USERNAME: github
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "MAVEN_USERNAME=${MAVEN_USERNAME}" >> "$GITHUB_ENV"
          echo "MAVEN_TOKEN=${MAVEN_TOKEN}" >> "$GITHUB_ENV"
      - name: Checkout arm-ttk
        uses: actions/checkout@v2
        with:
          repository: Azure/arm-ttk
          path: arm-ttk
      - name: Checkout ${{ env.repoName }}
        uses: actions/checkout@v2
        with:
          path: ${{ env.repoName }}
          ref: ${{ github.event.inputs.ref }}
      - name: Build ${{ env.repoName }}
        run: |
          deployWLO=false
          if ${{ inputs.deployWLO == true || github.event.client_payload.deployWLO == true }}; then
            deployWLO=true
          fi
          deployApplication=false
          if ${{ inputs.deployApplication == true || github.event.client_payload.deployApplication == true }}; then
            deployApplication=true
          fi
          echo "deployApplication=${deployApplication}" >> $GITHUB_ENV
          autoScaling=false
          if ${{ inputs.autoScaling == true || github.event.client_payload.autoScaling == true }}; then
            autoScaling=true
          fi
          cd ${{ env.repoName }}
          
          if ${{ env.createCluster == 'false' }}; then
            echo "Deploy with an existing ARO cluster"
            createCluster="false"
            clusterName=${{ env.clusterName }}
            clusterRGName=${{ env.testResourceGroup }}
          else
            echo "Deploy with a new ARO cluster"
            createCluster="true"
            clusterName="aro-cluster-${{ github.run_id }}-${{ github.run_number }}"
            clusterRGName=${{ env.testResourceGroup }}
          fi
          mvn -Dgit.repo=${{ env.userName }} -Dgit.tag=$GITHUB_REF_NAME \
            -DcreateCluster=${createCluster} \
            -DclusterName=${clusterName} \
            -DclusterRGName=${clusterRGName} \
            -DdeployWLO=${deployWLO} -Dedition="IBM WebSphere Application Server" -DproductEntitlementSource="Standalone" \
            -DdeployApplication=${deployApplication} -DappImagePath=${{ inputs.appImagePath }} -DautoScalingParam=${autoScaling} -DappReplicas=2 \
            -Dtest.args="-Test All" -Passembly -Ptemplate-validation-tests clean install
      - uses: azure/login@v1
        id: azure-login
        with:
          creds: ${{ env.azureCredentials }}       
      - name: Provision ARO Cluster as an existing cluster for deployment
        if: ${{ env.createCluster == 'false' }}
        run: |
          echo "Provisioning an ARO cluster: ${{ env.clusterName }} as an existing cluster for deployment"
          VIRTUALNETWORK=vnet-for-existing-aro-cluster
          az group create --name ${{ env.testResourceGroup }} --location ${{ env.location }}
          echo "az group created"
          az network vnet create --resource-group ${{ env.testResourceGroup }} --name $VIRTUALNETWORK --address-prefixes 10.0.0.0/22
          echo "network vnet created"
          az network vnet subnet create --resource-group ${{ env.testResourceGroup }} --vnet-name $VIRTUALNETWORK --name master-subnet --address-prefixes 10.0.0.0/23
          echo "network vnet subnet created master"
          az network vnet subnet create --resource-group ${{ env.testResourceGroup }} --vnet-name $VIRTUALNETWORK --name worker-subnet --address-prefixes 10.0.2.0/23
          echo "network vnet subnet created worker"
          sleep 60
          
          # Retry logic for ARO cluster creation with error checking
          echo "Creating ARO cluster: ${{ env.clusterName }}"
          MAX_RETRIES=5
          RETRY_COUNT=0
          RETRY_DELAY=60
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES to create ARO cluster..."
            
            if az aro create \
              --resource-group ${{ env.testResourceGroup }} \
              --name ${{ env.clusterName }} \
              --vnet $VIRTUALNETWORK \
              --master-subnet master-subnet \
              --worker-subnet worker-subnet; then
              
              # Verify cluster was created successfully
              echo "Verifying ARO cluster creation..."
              CLUSTER_STATE=$(az aro show \
                --resource-group ${{ env.testResourceGroup }} \
                --name ${{ env.clusterName }} \
                --query provisioningState -o tsv 2>/dev/null)
              
              if [[ "$CLUSTER_STATE" == "Succeeded" ]]; then
                echo "ARO cluster created successfully with state: $CLUSTER_STATE"
                break
              else
                echo "Warning: Cluster created but state is: $CLUSTER_STATE"
                if [ $RETRY_COUNT -lt $((MAX_RETRIES - 1)) ]; then
                  echo "Waiting ${RETRY_DELAY} seconds before retry..."
                  sleep $RETRY_DELAY
                  RETRY_DELAY=$((RETRY_DELAY * 2))  # Exponential backoff
                fi
              fi
            else
              echo "Error: ARO cluster creation failed on attempt $((RETRY_COUNT + 1))"
              if [ $RETRY_COUNT -lt $((MAX_RETRIES - 1)) ]; then
                echo "Waiting ${RETRY_DELAY} seconds before retry..."
                sleep $RETRY_DELAY
                RETRY_DELAY=$((RETRY_DELAY * 2))  # Exponential backoff
              fi
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done
          
          # Final verification
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "Error: Failed to create ARO cluster after $MAX_RETRIES attempts"
            exit 1
          fi
          
          echo "ARO cluster provisioning completed successfully"
      - name: Start the deployment
        id: deploy
        run: |
          servicePrincipal=$(az ad sp create-for-rbac)
          echo "Trying to get clientId from service principal"
          clientId=$(echo $servicePrincipal | jq -r '.appId')
          echo "clientId=${clientId}" >> $GITHUB_ENV
          echo "clientId=${clientId}" >> "$GITHUB_OUTPUT"
          echo "Trying to get clientSecret from service principal"
          clientSecret=$(echo $servicePrincipal | jq -r '.password')

          # Wait for Azure AD replication
          echo "Waiting for Azure AD to replicate the service principal..."
          sleep 20
    
          # Retry logic for fetching aadObjectId
          echo "Trying to get aadObjectId from service principal"
          for i in {1..15}; do
            aadObjectId=$(az ad sp show --id ${clientId} --query id -o tsv 2>/dev/null)
            if [[ -n "$aadObjectId" && "$aadObjectId" != "None" ]]; then
              echo "Successfully retrieved aadObjectId: $aadObjectId"
              break
            fi
            if [ $i -lt 15 ]; then
              echo "Attempt $i failed, retrying in 20 seconds..."
              sleep 20
            else
            echo "Failed to retrieve aadObjectId after 15 attempts"
              exit 1
            fi
          done          

          echo "Trying to get rpObjectId from service principal"
          rpObjectId=$(az ad sp list --display-name "Azure Red Hat OpenShift RP" --query [0].id -o tsv)
          cd ${{ env.repoName }}/target/cli
          chmod a+x deploy.azcli
          
          # Add deployment error capture
          set +e
          ./deploy.azcli -n ${{ env.testDeploymentName }} -g ${{ env.testResourceGroup }} -l ${{ env.location }} -t ${{ env.pullSecretEncoded }} \
            -c ${clientId} -s ${clientSecret} -a ${aadObjectId} -r ${rpObjectId}
          DEPLOY_EXIT_CODE=$?
          set -e

          if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
            echo "Deployment failed with exit code: $DEPLOY_EXIT_CODE"
            az deployment group show -n ${{ env.testDeploymentName }} -g ${{ env.testResourceGroup }} --query "{state:properties.provisioningState, errors:properties.error}" || true
            exit $DEPLOY_EXIT_CODE
          fi
      - name: Retrieve deployment error details
        if: failure()
        run: |
          echo "=== Deployment Details ==="
          az deployment group show \
            -n ${{ env.testDeploymentName }} \
            -g ${{ env.testResourceGroup }} \
            --query 'properties.error' -o json
    
          echo "=== Operation List ==="
          az deployment operation group list \
            -n ${{ env.testDeploymentName }} \
            -g ${{ env.testResourceGroup }} \
            --query "[?properties.provisioningState=='Failed']" -o json 
      - name: Verify the deployment
        run: |
          resourceNamePrefix="aroscript"
          echo "Looking for resources with prefix: ${resourceNamePrefix}"
          
          # Find the resource that starts with the prefix
          resourceName=$(az resource list -g ${{ env.testResourceGroup }} --resource-type Microsoft.Resources/deploymentScripts --query "[?starts_with(name, '${resourceNamePrefix}')].name" -o tsv | head -1)
          echo "Found resource: ${resourceName}"
          
          if [[ -z "$resourceName" ]]; then
            echo "No resource found with prefix: ${resourceNamePrefix}"
            exit 1
          fi
          
          appEndpoint=$(az resource show -n ${resourceName} -g ${{ env.testResourceGroup }} --resource-type Microsoft.Resources/deploymentScripts --query "properties.outputs.appEndpoint" -o tsv)
          echo "appEndpoint: ${appEndpoint}"
          if [[ $deployApplication == "true" ]]; then
            if [[ -z "$appEndpoint" ]]; then
              echo "Invalid value of appEndpoint: ${appEndpoint}"
              exit 1
            fi
            httpCode=$(curl --verbose --connect-timeout 60 --max-time 180 --retry 10 --retry-delay 30 --retry-max-time 180 --retry-connrefused --write-out '%{http_code}' --silent --output /dev/null $appEndpoint)
            echo "http_code is $httpCode"
            if [ "$httpCode" -ne 200 ]; then
              echo "Failed to access ${appEndpoint}."
              exit 1
            fi
          elif [[ -n "$appEndpoint" ]]; then
            echo "Invalid value of appEndpoint: ${appEndpoint}"
            exit 1
          fi
      - name: Generate artifact file name and path
        id: artifact_file
        run: |
          version=$(awk '/<version>[^<]+<\/version>/{gsub(/<version>|<\/version>/,"",$1);print $1;exit;}' ${{ env.repoName }}/pom.xml)
          artifactName=${{ env.repoName }}-$version-arm-assembly
          unzip ${{ env.repoName }}/target/$artifactName.zip -d ${{ env.repoName }}/target/$artifactName
          echo "##[set-output name=artifactName;]${artifactName}"
          echo "##[set-output name=artifactPath;]${{ env.repoName }}/target/$artifactName"
      - name: Archive ${{ env.repoName }} template
        uses: actions/upload-artifact@v4.6.2
        if: success()
        with:
          name: ${{steps.artifact_file.outputs.artifactName}}
          path: ${{steps.artifact_file.outputs.artifactPath}}
  notification:
    needs: integration-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Output inputs from workflow_dispatch
        run: echo "${{ toJSON(github.event.inputs) }}"
      - name: Output client_payload from repository_dispatch
        run: echo "${{ toJSON(github.event.client_payload) }}"
      - name: Send notification
        if: ${{ env.msTeamsWebhook != 'NA' }}
        run: |
            workflowJobs=$(curl -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ env.userName }}/${{ env.repoName }}/actions/runs/${{ github.run_id }}/jobs)
            successIntegrationTestJob=$(echo $workflowJobs | jq 'select(.jobs != null) | .jobs | map(select(.name=="integration-test" and .conclusion=="success")) | length')
            echo "$successIntegrationTestJob"
            if [ -z $successIntegrationTestJob ];then
              echo "jobs not retrieved."
            elif (($successIntegrationTestJob == 0));then
                echo "Job integration-test failed, send notification to Teams"
                curl ${{ env.msTeamsWebhook }} \
                -H 'Content-Type: application/json' \
                --data-binary @- << EOF
                {
                "@context":"http://schema.org/extensions",
                "@type":"MessageCard",
                "text":"Workflow integration-test of repo ${{ env.repoName }} failed, please take a look at: https://github.com/${{ env.userName }}/${{ env.repoName }}/actions/runs/${{ github.run_id }}"
                }
            EOF
            else
                echo "Job integration-test succeeded."
            fi

  delete-resources:
    needs: [integration-test, notification]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: azure/login@v1
        id: azure-login
        with:
          creds: ${{ env.azureCredentials }}
      - name: Checkout ${{ env.repoName }}
        uses: actions/checkout@v2
        with:
          path: ${{ env.repoName }}
          ref: ${{ github.event.inputs.ref }}
      - name: Delete all Azure resources
        id: delete-resources
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deleteAzureResources) || (github.event_name == 'repository_dispatch' && github.event.client_payload.deleteAzureResources) }}
        run: |
            echo "delete resource group: " ${{ env.testResourceGroup }}
            az group delete -n ${{ env.testResourceGroup }} --yes
            echo "delete app with clientId: " ${{ needs.integration-test.outputs.clientId }}
            az ad app delete --id ${{ needs.integration-test.outputs.clientId }}

